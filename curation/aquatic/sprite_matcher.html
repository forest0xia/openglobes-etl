<title>Sprite Matcher — 214 Species</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #111; color: #eee; padding: 16px; }
h1 { margin-bottom: 8px; font-size: 20px; }
.stats { margin-bottom: 12px; color: #aaa; font-size: 13px; }
.controls { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.controls button { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
.btn-green { background: #4CAF50; color: white; }
.btn-gray { background: #444; color: white; }
.btn-red { background: #e74c3c; color: white; }
.controls input { padding: 6px 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #eee; width: 200px; font-size: 12px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
.card { background: #1a1a2e; border-radius: 8px; padding: 10px; border: 2px solid #333; cursor: pointer; }
.card:hover { border-color: #4fc3f7; }
.card.ok { border-color: #4CAF50; }
.card.bad { border-color: #e74c3c; }
.card.selected { border-color: #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
.card-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.card-top h3 { font-size: 11px; color: #4fc3f7; max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
.tag.star { background: #FFD700; color: #000; }
.tag.ecosystem { background: #4CAF50; color: #fff; }
.tag.surprise { background: #E040FB; color: #fff; }
.card-body { display: flex; gap: 8px; align-items: center; }
.sprite-img { width: 100px; height: 70px; object-fit: contain; background: #0a0a1a; border-radius: 4px; }
.info { flex: 1; font-size: 11px; color: #888; }
.info .zh { color: #ccc; font-size: 13px; }
.info .file { font-family: monospace; font-size: 9px; color: #666; word-break: break-all; margin-top: 2px; }

/* Picker */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding: 16px; }
.overlay.active { display: block; }
.overlay h2 { font-size: 16px; margin-bottom: 8px; position: sticky; top: 0; background: #111; padding: 8px; z-index: 1; }
.overlay .close { position: fixed; top: 12px; right: 20px; font-size: 24px; cursor: pointer; z-index: 101; }
.overlay input { margin-bottom: 8px; padding: 6px; width: 250px; border-radius: 5px; border: 1px solid #444; background: #222; color: #eee; }
.picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
.picker-item { background: #1a1a2e; border-radius: 6px; padding: 6px; cursor: pointer; text-align: center; border: 2px solid transparent; }
.picker-item:hover { border-color: #4fc3f7; }
.picker-item.used { opacity: 0.25; }
.picker-item img { width: 110px; height: 70px; object-fit: contain; background: #0a0a1a; border-radius: 3px; }
.picker-item .lbl { font-size: 9px; color: #888; margin-top: 2px; word-break: break-all; }
</style>
</head>
<body>
<h1>Sprite Matcher</h1>
<div class="stats" id="stats"></div>
<div class="controls">
  <input type="text" id="search" placeholder="Search name, group, Chinese..." oninput="render()">
  <button class="btn-red" onclick="showFilter='bad';render()">Needs Fix</button>
  <button class="btn-gray" onclick="showFilter='all';render()">All (214)</button>
  <button class="btn-green" onclick="showFilter='ok';render()">Verified</button>
  <button class="btn-gray" onclick="document.getElementById('search').value='coral';render()">Coral</button>
  <button class="btn-gray" onclick="document.getElementById('search').value='shark';render()">Shark</button>
  <button class="btn-gray" onclick="document.getElementById('search').value='whale';render()">Whale</button>
  <button class="btn-gray" onclick="document.getElementById('search').value='star';render()">Star Tier</button>
  <button class="btn-gray" onclick="document.getElementById('search').value='';render()">Clear Filter</button>
  <button class="btn-green" onclick="exportMapping()">Export JSON</button>
  <button class="btn-gray" onclick="copyApplyScript()">Copy Shell Script</button>
  <button class="btn-red" onclick="if(confirm('Reset all?')){localStorage.removeItem('sprite_mapping_v2');location.reload()}">Reset</button>
</div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <span class="close" onclick="closePicker()">&times;</span>
  <h2 id="picker-title">Pick sprite for: ...</h2>
  <input type="text" id="picker-search" placeholder="Filter sprites..." oninput="renderPicker()">
  <div class="picker-grid" id="picker-grid"></div>
</div>

const BASE = "../../output/aquatic/sprites/";

// mapping: species name -> { sprite, verified }
let mapping = {};
const saved = localStorage.getItem('sprite_mapping_v2');
if (saved) mapping = JSON.parse(saved);

// These 3 species have no dedicated sprite — need manual assignment
const NEEDS_FIX = new Set(["Balaenoptera musculus", "Acanthaster planci", "Turbinaria reniformis"]);

// Initialize: always set verified status based on NEEDS_FIX
SPECIES.forEach(s => {
  if (!mapping[s.name]) {
    mapping[s.name] = { sprite: s.hasExpected ? s.expectedSprite : s.currentSprite, verified: false };
  }
  // Force-verify the 211 known-good ones (unless user already manually changed them)
  if (!NEEDS_FIX.has(s.name) && !mapping[s.name].verified) {
    mapping[s.name].verified = true;
  }
});

let showFilter = 'bad';  // default to showing only ones that need fixing
let currentPick = null;

function save() { localStorage.setItem('sprite_mapping_v2', JSON.stringify(mapping)); }

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  let okCount = 0, badCount = 0;
  
  grid.innerHTML = SPECIES.map(s => {
    const m = mapping[s.name] || {};
    const sprite = m.sprite || '';
    const verified = m.verified || false;
    if (verified) okCount++; else badCount++;
    
    if (showFilter === 'ok' && !verified) return '';
    if (showFilter === 'bad' && verified) return '';
    if (q && !s.name.toLowerCase().includes(q) && !(s.nameZh||'').includes(q) && !s.group.includes(q) && !s.tier.includes(q)) return '';
    
    const cls = verified ? 'ok' : 'bad';
    const imgSrc = sprite ? BASE + sprite : '';
    
    return `<div class="card ${cls}" onclick="openPicker('${s.name}')">
      <div class="card-top">
        <h3 title="${s.name}">${s.name}</h3>
        <span class="tag ${s.tier}">${s.tier}</span>
      </div>
      <div class="card-body">
        ${imgSrc ? `<img class="sprite-img" src="${imgSrc}">` : `<div class="sprite-img"></div>`}
        <div class="info">
          <div class="zh">${s.nameZh||''}</div>
          <div style="color:#666">${s.group}</div>
          <div class="file">${sprite || 'none'}</div>
          ${verified ? '<div style="color:#4CAF50">✓ verified</div>' : '<div style="color:#e74c3c">✗ check</div>'}
        </div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('stats').textContent = `✓ ${okCount} verified | ✗ ${badCount} to check | ${SPECIES.length} total`;
}

function openPicker(name) {
  currentPick = name;
  document.getElementById('picker-title').textContent = `Pick sprite for: ${name}`;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('picker-search').value = '';
  renderPicker();
}
function closePicker() {
  document.getElementById('overlay').classList.remove('active');
  currentPick = null;
}

function renderPicker() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  const used = new Set(Object.values(mapping).map(m => m.sprite));
  const grid = document.getElementById('picker-grid');
  
  // Show "Mark as correct" button first
  let html = `<div class="picker-item" style="border-color:#4CAF50" onclick="verifyCurrentSprite()">
    <div style="height:70px;display:flex;align-items:center;justify-content:center;color:#4CAF50;font-size:24px">✓</div>
    <div class="lbl" style="color:#4CAF50">Current is correct</div>
  </div>`;
  
  html += ALL_SPRITES.map(f => {
    if (q && !f.toLowerCase().includes(q)) return '';
    const isUsed = used.has(f);
    return `<div class="picker-item ${isUsed ? 'used' : ''}" onclick="assignSprite('${f}')">
      <img src="${BASE}${f}">
      <div class="lbl">${f.replace('sp-','').replace('.png','').replaceAll('_',' ')}</div>
    </div>`;
  }).join('');
  
  grid.innerHTML = html;
}

function verifyCurrentSprite() {
  if (currentPick) {
    mapping[currentPick].verified = true;
    save(); closePicker(); render();
  }
}

function assignSprite(filename) {
  if (currentPick) {
    mapping[currentPick] = { sprite: filename, verified: true };
    save(); closePicker(); render();
  }
}

function exportMapping() {
  const out = {};
  Object.entries(mapping).forEach(([name, m]) => { out[name] = m.sprite; });
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'sprite_mapping.json'; a.click();
}

function copyApplyScript() {
  const cmds = Object.entries(mapping).map(([name, m]) => {
    const slug = name.toLowerCase().replace(/ /g, '_');
    const target = `sp-${slug}.png`;
    if (m.sprite === target) return null;
    return `cp "output/aquatic/sprites/${m.sprite}" "output/aquatic/sprites/${target}"`;
  }).filter(Boolean);
  navigator.clipboard.writeText(cmds.join('\n')).then(() => {
    alert(`Copied ${cmds.length} commands. Paste in terminal.`);
  });
}

render();
